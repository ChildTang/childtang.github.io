{%- comment -%}Visitor globe. Endpoint returns { total, countries: { CN: 12, US: 3 } }.
Library/textures/geojson are self-hosted (no CDN) for reliability.{%- endcomment -%}
<link rel="stylesheet" href="/assets/css/visitor-globe.css?v={{ site.time | date: '%s' }}">

<div id="visitor-globe" class="vg-widget">
  <div class="vg-globe-wrap">
    <div class="vg-globe" role="img" aria-label="Rotating globe showing where visitors come from"></div>
  </div>
  <div class="vg-stats">
    <div class="vg-count">0</div>
    <div class="vg-label">visits</div>
  </div>
</div>

<script>
  /* endpoint = live Worker (preferred); snapshot = same-origin fallback (auto-synced).
     Keep this as block comments only: the HTML compress layout strips newlines,
     and any // comment would then swallow the rest of the object. */
  window.VISITOR_GLOBE_CONFIG = { endpoint: "https://visitor-globe-api.childtang.workers.dev", snapshot: "/assets/data/visitor-stats.json" };
</script>
<script src="/assets/vendor/globe.gl.min.js" defer></script>
<script src="/assets/js/visitor-globe.js?v={{ site.time | date: '%s' }}" defer></script>
