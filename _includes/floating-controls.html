{%- comment -%}
  Global floating controls: dark-mode toggle + back-to-top.
  Self-contained (own CSS + JS, idempotent). Include once per page,
  before </body>. Works on themed pages and standalone HTML pages.
{%- endcomment -%}
<button class="fc-dark" id="fcDark" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
<button class="fc-top" id="fcTop" type="button" aria-label="Back to top" title="Back to top">↑</button>
<style>
.fc-dark,.fc-top{position:fixed;bottom:28px;z-index:1000;width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;font-size:1.05em;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.22);transition:transform .25s,opacity .25s,background .25s,box-shadow .25s;}
.fc-dark{right:78px;background:#1f2937;color:#fff;}
.fc-top{right:28px;background:#1565c0;color:#fff;opacity:0;pointer-events:none;}
.fc-top.show{opacity:1;pointer-events:auto;}
.fc-dark:hover,.fc-top:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.3);}
body.dark-mode .fc-dark{background:#ffd54f;color:#1a2332;}
body.dark-mode .fc-top{background:#388bfd;}
@media print{.fc-dark,.fc-top{display:none!important;}}
@media(max-width:560px){.fc-dark{right:16px;bottom:74px;}.fc-top{right:16px;bottom:20px;}}
</style>
<script>
(function(){
  var d=document.getElementById('fcDark'), t=document.getElementById('fcTop');
  if(d && !d.dataset.bound){
    d.dataset.bound='1';
    function sync(){ d.textContent = document.body.classList.contains('dark-mode') ? '\u2600\uFE0F' : '\uD83C\uDF19'; }
    sync();
    d.addEventListener('click',function(){
      var on=document.body.classList.toggle('dark-mode');
      try{ localStorage.setItem('darkMode', on); }catch(e){}
      sync();
    });
  }
  if(t && !t.dataset.bound){
    t.dataset.bound='1';
    window.addEventListener('scroll',function(){ t.classList.toggle('show', window.scrollY>500); },{passive:true});
    t.addEventListener('click',function(){ window.scrollTo({top:0,behavior:'smooth'}); });
  }
})();
</script>
