name: Update Citation Counts

on:
  schedule:
    - cron: '0 22 * * *'   # Every day 06:00 Beijing time (UTC+8) = 22:00 UTC
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch citations via SerpAPI (Google Scholar Author)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, datetime, os

          key = os.environ.get("SERPAPI_KEY", "").strip()
          if not key:
            print("SERPAPI_KEY secret not set; skipping (keeping existing citations).")
            raise SystemExit(0)

          AUTHOR_ID = "Nof6bfUAAAAJ"
          params = {
            "engine": "google_scholar_author",
            "author_id": AUTHOR_ID,
            "api_key": key,
            "hl": "en",
          }
          url = "https://serpapi.com/search.json?" + urllib.parse.urlencode(params)

          try:
            with urllib.request.urlopen(url, timeout=40) as resp:
              data = json.loads(resp.read().decode("utf-8", errors="ignore"))
          except Exception as e:
            print(f"SerpAPI request failed: {e} (keeping existing citations).")
            raise SystemExit(0)

          if data.get("error"):
            print(f"SerpAPI error: {data['error']} (keeping existing citations).")
            raise SystemExit(0)

          results = {}
          try:
            table = data["cited_by"]["table"]
            for row in table:
              if "citations" in row:
                results["_total"] = int(row["citations"]["all"])
              elif "h_index" in row:
                results["_hindex"] = int(row["h_index"]["all"])
              elif "i10_index" in row:
                results["_i10"] = int(row["i10_index"]["all"])
          except Exception as e:
            print(f"Could not parse cited_by table: {e} (keeping existing citations).")
            raise SystemExit(0)

          if "_total" not in results:
            print("No citation total parsed; keeping existing file.")
            raise SystemExit(0)

          path = "_data/citations.json"
          try:
            with open(path) as f:
              existing = json.load(f)
          except Exception:
            existing = {}

          existing.update(results)
          existing["_updated"] = datetime.datetime.utcnow().strftime("%Y-%m-%d")
          existing["_source"] = "Google Scholar via SerpAPI (Nof6bfUAAAAJ)"

          with open(path, "w") as f:
            json.dump(existing, f, indent=2)

          print(f"Updated: total={results.get('_total')} h-index={results.get('_hindex')} i10={results.get('_i10')}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.json
          git diff --staged --quiet || git commit -m "chore: auto-update citations via SerpAPI [skip ci]"
          git push
